<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Profesor: metadatos base del documento (codificación + diseño responsive). -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Plataforma Académica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Profesor: estilos exclusivos del login para separar visualmente la etapa de acceso. -->
  <style>
    :root {
      --bg:      #0e0c0b;
      --card:    #1a1714;
      --border:  rgba(255,255,255,0.08);
      --accent:  #e8621a;
      --gold:    #C8972B;
      --text:    #f0ede9;
      --muted:   #7a7470;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
    }

    /* Animated background blobs */
    .bg-blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--accent); top: -80px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 320px; height: 320px; background: var(--gold);   bottom: -60px; right: -80px; animation-delay: 3s; }
    .blob-3 { width: 200px; height: 200px; background: #8b4cf6;       top: 50%; left: 60%; animation-delay: 6s; }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Card */
    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .login-top {
      background: linear-gradient(135deg, rgba(232,98,26,0.12) 0%, rgba(200,151,43,0.06) 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .logo-wrap {
      width: 52px; height: 52px; border-radius: 13px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 24px rgba(232,98,26,0.4);
    }

    /* Role selector */
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.1rem; }
    .role-opt {
      border: 1.5px solid var(--border);
      border-radius: 0.7rem;
      padding: 0.85rem 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: transparent;
    }
    .role-opt:hover { border-color: rgba(232,98,26,0.4); background: rgba(232,98,26,0.05); }
    .role-opt.selected {
      border-color: var(--accent);
      background: rgba(232,98,26,0.1);
    }
    .role-opt .ri  { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .role-opt .rl  { font-weight: 700; font-size: 0.88rem; color: var(--text); }
    .role-opt .rd  { font-size: 0.72rem; color: var(--muted); }

    /* Form */
    .form-label-dark { font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; display: block; }
    .input-dark {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      color: var(--text);
      padding: 0.6rem 0.9rem;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .input-dark::placeholder { color: var(--muted); }
    .input-dark:focus { border-color: var(--accent); background: rgba(232,98,26,0.04); }
    .input-group-dark {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .input-group-dark:focus-within { border-color: var(--accent); }
    .input-group-dark .ig-icon {
      padding: 0 0.75rem;
      color: var(--muted); font-size: 0.9rem;
      display: flex; align-items: center;
    }
    .input-group-dark input {
      flex: 1; background: transparent; border: none;
      color: var(--text); padding: 0.6rem 0.75rem 0.6rem 0;
      font-size: 0.88rem; outline: none;
    }
    .input-group-dark input::placeholder { color: var(--muted); }

    .btn-enter {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #c94d0c);
      border: none; border-radius: 0.65rem;
      color: white; font-weight: 700; font-size: 0.9rem;
      padding: 0.7rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 6px 20px rgba(232,98,26,0.35);
    }
    .btn-enter:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-enter:active { transform: translateY(0); }

    .demo-box {
      background: rgba(251,191,36,0.07);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 0.6rem;
      padding: 0.75rem 0.9rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .demo-box strong { color: #fbbf24; }
    .mono { font-family: 'Consolas', monospace; color: var(--text); font-size: 0.8rem; }

    .error-box {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 0.6rem;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      color: #f87171;
    }
  </style>
</head>
<body>
  <!-- Profesor: capa estética independiente de la lógica; si la quitas, el login sigue funcionando igual. -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Profesor: contenedor principal del flujo de autenticación. -->
  <div class="login-card">
    <!-- Top -->
    <div class="login-top">
      <div class="logo-wrap">
        <i class="bi bi-mortarboard-fill text-white" style="font-size:1.4rem;"></i>
      </div>
      <h1 style="font-size:1.2rem;font-weight:700;color:var(--text);margin:0 0 0.2rem;">Plataforma Académica</h1>
      <p style="font-size:0.75rem;color:var(--muted);margin:0;">Universidad Anáhuac Puebla · Lic. Actuaría</p>
    </div>

    <!-- Form -->
    <div style="padding:1.5rem 1.75rem 1.75rem;">
      {% if error %}
      <div class="error-box mb-3">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <!-- Profesor: formulario POST con destino a `login_view`.
           Ahí se valida usuario y se construye la sesión. -->
      <form method="post" id="loginForm">
        {% csrf_token %}

        <!-- Profesor: selector didáctico de rol.
             No autentica por sí mismo; solo precarga datos demo en los inputs. -->
        <p style="font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:0.6rem;">Acceder como</p>
        <div class="role-grid">
          <div class="role-opt selected" data-rol="docente" onclick="selectRol('docente')">
            <div class="ri" style="color:var(--accent);"><i class="bi bi-person-badge-fill"></i></div>
            <div class="rl">Docente</div>
            <div class="rd">Vista de grupos</div>
          </div>
          <div class="role-opt" data-rol="alumno" onclick="selectRol('alumno')">
            <div class="ri" style="color:var(--gold);"><i class="bi bi-mortarboard-fill"></i></div>
            <div class="rl">Alumno</div>
            <div class="rd">Mi historial</div>
          </div>
        </div>
        <input type="hidden" name="rol" id="rolInput" value="docente" />

        <div style="margin-bottom:0.85rem;">
          <label class="form-label-dark">Correo institucional</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-envelope"></i></span>
            <input type="email" name="correo" id="correoInput"
                   placeholder="usuario@anahuac.mx"
                   value="docente@anahuac.mx" required />
          </div>
        </div>

        <div style="margin-bottom:1.25rem;">
          <label class="form-label-dark">Contraseña</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="passInput"
                   placeholder="••••••••"
                   value="demo123" required />
          </div>
        </div>

        <button type="submit" class="btn-enter">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar a la Plataforma
        </button>
      </form>

      <div class="demo-box mt-3">
        <strong>Acceso Demo</strong><br>
        <span class="mono">docente@anahuac.mx</span> · <span class="mono">demo123</span><br>
        <span class="mono">alumno@anahuac.mx</span> &nbsp;· <span class="mono">demo123</span>
      </div>
    </div>

    <div style="padding:0.6rem 1.75rem;border-top:1px solid var(--border);display:flex;justify-content:center;gap:0.4rem;">
      <span style="font-size:0.7rem;color:var(--muted);">
        <i class="bi bi-shield-check me-1" style="color:var(--accent);"></i>
        Prototipo v1.0 · Juan Pablo Penedo · 2026
      </span>
    </div>
  </div>

  <!-- Profesor: script de apoyo visual para pruebas rápidas de ambos perfiles. -->
  <script>
    const CREDS = {
      docente: { correo: 'docente@anahuac.mx', pass: 'demo123' },
      alumno:  { correo: 'alumno@anahuac.mx',  pass: 'demo123' },
    };
    // Profesor: sincroniza botón seleccionado + campos del formulario.
    // Importante: la validación real sigue ocurriendo en backend (Python).
    function selectRol(rol) {
      document.querySelectorAll('.role-opt').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-rol="${rol}"]`).classList.add('selected');
      document.getElementById('rolInput').value = rol;
      document.getElementById('correoInput').value = CREDS[rol].correo;
      document.getElementById('passInput').value   = CREDS[rol].pass;
    }
  </script>
</body>
</html>
