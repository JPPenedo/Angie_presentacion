<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Plataforma Académica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0b;
      --card: #1a1714;
      --border: rgba(255,255,255,0.08);
      --accent: #e8621a;
      --gold: #C8972B;
      --text: #f0ede9;
      --muted: #7a7470;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
      color: var(--text);
    }
    .login-card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .login-top {
      background: linear-gradient(135deg, rgba(232,98,26,0.14), rgba(200,151,43,0.08));
      border-bottom: 1px solid var(--border);
      padding: 1.8rem;
      text-align: center;
    }
    .logo-wrap {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      margin: 0 auto 0.8rem;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(232,98,26,0.35);
    }
    .input-group-dark {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      overflow: hidden;
    }
    .input-group-dark:focus-within { border-color: var(--accent); }
    .input-group-dark .ig-icon {
      padding: 0 0.75rem;
      color: var(--muted);
    }
    .input-group-dark input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 0.65rem 0.75rem 0.65rem 0;
      outline: none;
    }
    .btn-enter {
      width: 100%;
      border: none;
      border-radius: 0.65rem;
      background: linear-gradient(135deg, var(--accent), #c94d0c);
      color: white;
      font-weight: 700;
      padding: 0.72rem;
    }
    .btn-enter:hover { opacity: 0.92; }
    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: #f87171;
      border-radius: 0.6rem;
      padding: 0.65rem 0.85rem;
      font-size: 0.83rem;
    }
    .info-box {
      background: rgba(52,211,153,0.12);
      border: 1px solid rgba(52,211,153,0.25);
      color: #34d399;
      border-radius: 0.6rem;
      padding: 0.65rem 0.85rem;
      font-size: 0.83rem;
    }
    .helper-box {
      margin-top: 0.9rem;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 0.6rem;
      padding: 0.7rem 0.85rem;
      font-size: 0.77rem;
      color: var(--muted);
    }
    .helper-link {
      margin-top: 1rem;
      display: block;
      text-align: center;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
    }
    .helper-link:hover { color: #e0b14a; }
    .quick-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 0.45rem;
      font-size: 0.74rem;
      padding: 0.28rem 0.55rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-top">
      <div class="logo-wrap">
        <i class="bi bi-mortarboard-fill text-white" style="font-size:1.4rem;"></i>
      </div>
      <h1 style="font-size:1.2rem;font-weight:700;margin:0 0 0.15rem;">Iniciar sesión</h1>
      <p style="font-size:0.76rem;color:var(--muted);margin:0;">Universidad Anáhuac Puebla · Plataforma Académica</p>
    </div>

    <div style="padding:1.5rem 1.75rem;">
      {% if info %}
      <div class="info-box mb-3">
        <i class="bi bi-check-circle me-1"></i>{{ info }}
      </div>
      {% endif %}

      {% if error %}
      <div class="error-box mb-3">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div style="margin-bottom:0.85rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Correo institucional o ID institucional</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-envelope"></i></span>
            <input type="text" name="dato_acceso" id="correoInput" placeholder="usuario@anahuac.mx o 12345678" value="{{ prefill_dato }}" required />
          </div>
        </div>

        <div style="margin-bottom:1.2rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Contraseña</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="passInput" placeholder="Ingresa tu contraseña" required />
          </div>
          <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--muted);margin-top:0.45rem;cursor:pointer;">
            <input type="checkbox" id="showPassLogin" style="accent-color:#e8621a;" />
            Mostrar contraseña
          </label>
        </div>

        <button type="submit" class="btn-enter">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>

      <div class="helper-box">
        <div style="margin-bottom:0.35rem;"><strong>Acceso demo rápido</strong></div>
        <button class="quick-btn" onclick="fillDemo('docente@anahuac.mx','demo123')">Docente demo</button>
        <button class="quick-btn" onclick="fillDemo('alumno@anahuac.mx','demo123')">Alumno demo</button>
        <button class="quick-btn" onclick="fillDemo('coordinacion@anahuac.mx','demo123')">Coordinación demo</button>
      </div>

      <a href="{% url 'core:crear_cuenta' %}" class="helper-link">
        <i class="bi bi-person-plus me-1"></i>¿No tienes cuenta? Crear cuenta
      </a>
      <a href="{% url 'core:recuperar_password' %}" class="helper-link" style="margin-top:0.5rem;">
        <i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?
      </a>
    </div>
  </div>

  <script>
    function fillDemo(correo, pass) {
      document.getElementById('correoInput').value = correo;
      document.getElementById('passInput').value = pass;
    }
    document.getElementById('showPassLogin').addEventListener('change', function () {
      document.getElementById('passInput').type = this.checked ? 'text' : 'password';
    });
  </script>
</body>
</html>
