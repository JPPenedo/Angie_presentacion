<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña | Plataforma Académica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background:#0e0c0b; color:#f0ede9; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { width:100%; max-width:460px; background:#1a1714; border:1px solid rgba(255,255,255,0.08); border-radius:1rem; padding:1.5rem; }
    .input-wrap { display:flex; align-items:center; border:1px solid rgba(255,255,255,0.08); border-radius:0.6rem; background:rgba(255,255,255,0.04); }
    .input-wrap span { padding:0 0.75rem; color:#7a7470; }
    .input-wrap input { flex:1; border:none; background:transparent; color:#f0ede9; padding:0.65rem 0.75rem 0.65rem 0; outline:none; }
    .btn-main { width:100%; border:none; border-radius:0.65rem; background:linear-gradient(135deg,#e8621a,#c94d0c); color:white; font-weight:700; padding:0.72rem; }
    .msg { border-radius:0.6rem; padding:0.65rem 0.85rem; font-size:0.83rem; margin-bottom:0.9rem; }
    .msg.err { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25); color:#f87171; }
    .msg.ok { background:rgba(52,211,153,0.12); border:1px solid rgba(52,211,153,0.25); color:#34d399; }
    .link { display:block; text-align:center; margin-top:0.9rem; color:#C8972B; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="font-size:1.18rem;margin:0 0 0.25rem;">Recuperar contraseña</h1>
    <p style="font-size:0.78rem;color:#7a7470;margin-bottom:1rem;">Te enviaremos un enlace temporal a tu correo institucional.</p>

    {% if error %}
    <div class="msg err"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
    {% endif %}
    {% if info %}
    <div class="msg ok"><i class="bi bi-check-circle me-1"></i>{{ info }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label style="font-size:0.79rem;color:#7a7470;margin-bottom:0.35rem;display:block;">Correo institucional</label>
      <div class="input-wrap" style="margin-bottom:1rem;">
        <span><i class="bi bi-envelope"></i></span>
        <input type="email" name="correo" placeholder="usuario@anahuac.mx" required />
      </div>
      <button type="submit" class="btn-main"><i class="bi bi-send me-2"></i>Enviar enlace</button>
    </form>

    <a class="link" href="{% url 'core:login' %}"><i class="bi bi-arrow-left me-1"></i>Volver a iniciar sesión</a>
  </div>
</body>
</html>
