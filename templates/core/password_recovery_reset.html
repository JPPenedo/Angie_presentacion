<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña | Plataforma Académica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background:#0e0c0b; color:#f0ede9; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { width:100%; max-width:460px; background:#1a1714; border:1px solid rgba(255,255,255,0.08); border-radius:1rem; padding:1.5rem; }
    .input-wrap { display:flex; align-items:center; border:1px solid rgba(255,255,255,0.08); border-radius:0.6rem; background:rgba(255,255,255,0.04); }
    .input-wrap span { padding:0 0.75rem; color:#7a7470; }
    .input-wrap input { flex:1; border:none; background:transparent; color:#f0ede9; padding:0.65rem 0.75rem 0.65rem 0; outline:none; }
    .input-wrap input:-webkit-autofill,
    .input-wrap input:-webkit-autofill:hover,
    .input-wrap input:-webkit-autofill:focus,
    .input-wrap input:-webkit-autofill:active {
      -webkit-text-fill-color: #f0ede9;
      -webkit-box-shadow: 0 0 0 1000px rgba(255,255,255,0.04) inset;
      box-shadow: 0 0 0 1000px rgba(255,255,255,0.04) inset;
      caret-color: #f0ede9;
      transition: background-color 9999s ease-in-out 0s;
    }
    .btn-main { width:100%; border:none; border-radius:0.65rem; background:linear-gradient(135deg,#22c55e,#c94d0c); color:white; font-weight:700; padding:0.72rem; }
    .msg { border-radius:0.6rem; padding:0.65rem 0.85rem; font-size:0.83rem; margin-bottom:0.9rem; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25); color:#f87171; }
    .link { display:block; text-align:center; margin-top:0.9rem; color:#4ade80; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="font-size:1.18rem;margin:0 0 0.25rem;">Definir nueva contraseña</h1>
    <p style="font-size:0.78rem;color:#7a7470;margin-bottom:1rem;">La contraseña debe tener al menos 6 caracteres.</p>

    {% if error %}
    <div class="msg"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
    {% endif %}

    {% if token_valid %}
    <form method="post">
      {% csrf_token %}
      <label style="font-size:0.79rem;color:#7a7470;margin-bottom:0.35rem;display:block;">Nueva contraseña</label>
      <div class="input-wrap" style="margin-bottom:0.85rem;">
        <span><i class="bi bi-lock"></i></span>
        <input type="password" name="password" id="newPass" minlength="6" required />
      </div>

      <label style="font-size:0.79rem;color:#7a7470;margin-bottom:0.35rem;display:block;">Confirmar contraseña</label>
      <div class="input-wrap" style="margin-bottom:0.55rem;">
        <span><i class="bi bi-shield-lock"></i></span>
        <input type="password" name="password_confirm" id="newPassConfirm" minlength="6" required />
      </div>

      <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:#7a7470;margin-bottom:1rem;cursor:pointer;">
        <input type="checkbox" id="showResetPass" style="accent-color:#22c55e;" />
        Mostrar contraseña
      </label>

      <button type="submit" class="btn-main"><i class="bi bi-check2-circle me-2"></i>Guardar contraseña</button>
    </form>
    {% endif %}

    <a class="link" href="{% url 'core:login' %}"><i class="bi bi-arrow-left me-1"></i>Volver a iniciar sesión</a>
  </div>

  <script>
    const toggle = document.getElementById('showResetPass');
    if (toggle) {
      toggle.addEventListener('change', function () {
        const type = this.checked ? 'text' : 'password';
        document.getElementById('newPass').type = type;
        document.getElementById('newPassConfirm').type = type;
      });
    }
  </script>
</body>
</html>
