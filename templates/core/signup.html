<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta | Plataforma Académica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c0b;
      --card: #1a1714;
      --border: rgba(255,255,255,0.08);
      --accent: #e8621a;
      --gold: #C8972B;
      --text: #f0ede9;
      --muted: #7a7470;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
      color: var(--text);
    }
    .card-signup {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .top {
      background: linear-gradient(135deg, rgba(232,98,26,0.14), rgba(200,151,43,0.08));
      border-bottom: 1px solid var(--border);
      padding: 1.8rem;
      text-align: center;
    }
    .logo {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      margin: 0 auto 0.8rem;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(232,98,26,0.35);
    }
    .input-group-dark {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      overflow: hidden;
    }
    .input-group-dark:focus-within { border-color: var(--accent); }
    .input-group-dark .ig-icon {
      padding: 0 0.75rem;
      color: var(--muted);
    }
    .input-group-dark input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 0.65rem 0.75rem 0.65rem 0;
      outline: none;
    }
    .input-group-dark input:-webkit-autofill,
    .input-group-dark input:-webkit-autofill:hover,
    .input-group-dark input:-webkit-autofill:focus,
    .input-group-dark input:-webkit-autofill:active {
      -webkit-text-fill-color: var(--text);
      -webkit-box-shadow: 0 0 0 1000px rgba(255,255,255,0.04) inset;
      box-shadow: 0 0 0 1000px rgba(255,255,255,0.04) inset;
      caret-color: var(--text);
      transition: background-color 9999s ease-in-out 0s;
    }
    .input-group-dark select {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 0.65rem 0.75rem 0.65rem 0;
      outline: none;
    }
    .input-group-dark select option {
      background: #1a1714;
      color: #f0ede9;
    }
    .btn-main {
      width: 100%;
      border: none;
      border-radius: 0.65rem;
      background: linear-gradient(135deg, var(--accent), #c94d0c);
      color: white;
      font-weight: 700;
      padding: 0.72rem;
    }
    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: #f87171;
      border-radius: 0.6rem;
      padding: 0.65rem 0.85rem;
      font-size: 0.83rem;
    }
    .note-box {
      margin-top: 0.95rem;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 0.6rem;
      padding: 0.75rem 0.85rem;
      color: var(--muted);
      font-size: 0.77rem;
    }
    .back-link {
      margin-top: 1rem;
      display: block;
      text-align: center;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card-signup">
    <div class="top">
      <div class="logo">
        <i class="bi bi-person-plus-fill text-white" style="font-size:1.35rem;"></i>
      </div>
      <h1 style="font-size:1.2rem;font-weight:700;margin:0 0 0.15rem;">Crear cuenta</h1>
      <p style="font-size:0.76rem;color:var(--muted);margin:0;">Registro básico de alumno</p>
    </div>

    <div style="padding:1.5rem 1.75rem;">
      {% if error %}
      <div class="error-box mb-3">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div style="margin-bottom:0.85rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Tipo de cuenta</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-diagram-3"></i></span>
            <select name="rol">
              <option value="alumno" {% if form_data.rol == 'alumno' %}selected{% endif %}>Alumno</option>
              <option value="docente" {% if form_data.rol == 'docente' %}selected{% endif %}>Docente</option>
              <option value="coordinacion" {% if form_data.rol == 'coordinacion' %}selected{% endif %}>Coordinación académica</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:0.85rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Correo institucional</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-envelope"></i></span>
            <input type="email" name="correo" placeholder="usuario@anahuac.mx" value="{{ form_data.correo }}" required />
          </div>
        </div>

        <div style="margin-bottom:0.85rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Nombre completo</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-person"></i></span>
            <input type="text" name="nombre_completo" placeholder="Nombre(s) y apellidos" value="{{ form_data.nombre_completo }}" required />
          </div>
        </div>

        <div style="margin-bottom:1.2rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">ID institucional (8 dígitos)</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-upc-scan"></i></span>
            <input type="text" name="id_institucional" maxlength="8" placeholder="Ejemplo: 21003456" value="{{ form_data.id_institucional }}" required />
          </div>
        </div>

        <div style="margin-bottom:0.85rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Contraseña</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" minlength="6" placeholder="Mínimo 6 caracteres" required />
          </div>
        </div>

        <div style="margin-bottom:1.2rem;">
          <label style="font-size:0.79rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;display:block;">Confirmar contraseña</label>
          <div class="input-group-dark">
            <span class="ig-icon"><i class="bi bi-shield-lock"></i></span>
            <input type="password" name="password_confirm" id="passConfirmInput" minlength="6" placeholder="Repite la contraseña" required />
          </div>
          <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--muted);margin-top:0.45rem;cursor:pointer;">
            <input type="checkbox" id="showPassSignup" style="accent-color:#e8621a;" />
            Mostrar contraseñas
          </label>
        </div>

        <button type="submit" class="btn-main">
          <i class="bi bi-check2-circle me-2"></i>Crear cuenta
        </button>
      </form>

      <div class="note-box">
        Al crear tu cuenta, podrás iniciar sesión con correo o ID institucional + contraseña.
      </div>

      <a href="{% url 'core:login' %}" class="back-link">
        <i class="bi bi-arrow-left me-1"></i>Volver a iniciar sesión
      </a>
    </div>
  </div>
  <script>
    const passSignup = document.querySelector('input[name="password"]');
    const passConfirmSignup = document.getElementById('passConfirmInput');
    document.getElementById('showPassSignup').addEventListener('change', function () {
      const type = this.checked ? 'text' : 'password';
      passSignup.type = type;
      passConfirmSignup.type = type;
    });
  </script>
</body>
</html>
